name: Django Docker CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  docker-tests:
    name: Build container and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t restaurant-app .

      - name: Run Docker container
        run: docker run -d --name restaurant-container -p 8000:8000 restaurant-app

      - name: Run migrations
        run: docker exec restaurant-container python manage.py migrate

      - name: Run Django tests
        run: docker exec restaurant-container python manage.py test

      - name: Stop Docker container
        if: always()
        run: docker rm -f restaurant-container || true

  deploy:
    name: Deploy to Heroku
    needs: docker-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          usedocker: false