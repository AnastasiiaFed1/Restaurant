name: Django Docker CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  docker-tests:
    name: Build container, run it and execute tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t restaurant-app .

      - name: Run Docker container
        run: |
          docker run -d --name restaurant-container restaurant-app

      - name: Run Django tests inside container
        run: |
          docker exec restaurant-container python manage.py test

      - name: Stop Docker container
        if: always()
        run: |
          docker rm -f restaurant-container || true